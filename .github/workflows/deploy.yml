name: Deploy SaaS Inventory

on:
  push:
    branches: [ main ]

# Un solo deploy a la vez por ambiente
concurrency:
  group: vps-deploy-inventory-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    
    # 1. Descargar el código del repositorio
    - name: 📥 Checkout code
      uses: actions/checkout@v4

    # 2. Copiar archivos al VPS
    - name: 🚚 Copy files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        command_timeout: 10m
        timeout: 90s
        overwrite: true
        source: "."
        target: "/root/apps/saas-inventory"

    # 3. Entrar y Ejecutar Docker
    - name: 🚀 Deploy via SSH
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        script: |
          set -e
          
          mkdir -p /root/apps/saas-inventory
          cd /root/apps/saas-inventory
          
          # --- INYECCIÓN DE SECRETOS ---
          
          # 1. Archivo .env del backend
          echo "${{ secrets.ENV_FILE_INVENTORY }}" > .env
          
          # 2. Credencial de la App (Client Secret)
          echo '${{ secrets.CLIENT_SECRET_JSON }}' > client_secret.json
          
          # 3. Token de Sesión de Google
          echo '${{ secrets.TOKEN_JSON }}' > token.json
          
          # 4. .env del frontend (si existe secreto)
          if [ -n "${{ secrets.ENV_FILE_FRONT_INVENTORY }}" ]; then
            echo "${{ secrets.ENV_FILE_FRONT_INVENTORY }}" > front/.env.local
          fi
          
          # --- REINICIO DEL SERVICIO ---
          
          echo "🔄 Desplegando SaaS Inventory (API + Bot + Front)..."
          
          export COMPOSE_PROJECT_NAME=saas-inventory
          
          # Bajar contenedores viejos
          docker compose down || true
          
          # Limpiar contenedores temporales de recreates interrumpidos
          docker ps -a --format '{{.ID}} {{.Names}}' \
            | awk '$2 ~ /_inventory/ && $2 != "inventory_saas" && $2 != "inventory_front" {print $1}' \
            | xargs -r docker rm -f
          
          # Construir y levantar
          docker compose up -d --build --force-recreate --remove-orphans
          
          # Limpiar basura de Docker
          docker image prune -f
          
          echo "✅ ¡Deploy completado!"
