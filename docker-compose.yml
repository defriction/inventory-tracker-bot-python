version: '3.8'

services:
  # 📦 BOT + API (Python/FastAPI)
  inventory_bot:
    build: .
    container_name: inventory_saas
    restart: always
    env_file: .env
    volumes:
      - ./client_secret.json:/app/client_secret.json
      - ./token.json:/app/token.json
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      
      # --- API BACKEND (mismo dominio, path /api) ---
      - "traefik.http.routers.inventory-api.rule=Host(`inventory.defriction.org`) && PathPrefix(`/api`)"
      - "traefik.http.routers.inventory-api.entrypoints=websecure"
      - "traefik.http.routers.inventory-api.tls=true"
      - "traefik.http.routers.inventory-api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.inventory-api.loadbalancer.server.port=8000"
      
      # --- WEBHOOK TELEGRAM (path /webhook) ---
      - "traefik.http.routers.inventory-webhook.rule=Host(`inventory.defriction.org`) && PathPrefix(`/webhook`)"
      - "traefik.http.routers.inventory-webhook.entrypoints=websecure"
      - "traefik.http.routers.inventory-webhook.tls=true"
      - "traefik.http.routers.inventory-webhook.tls.certresolver=mytlschallenge"
      
      # --- ADMIN (path /admin) ---
      - "traefik.http.routers.inventory-admin.rule=Host(`inventory.defriction.org`) && PathPrefix(`/admin`)"
      - "traefik.http.routers.inventory-admin.entrypoints=websecure"
      - "traefik.http.routers.inventory-admin.tls=true"
      - "traefik.http.routers.inventory-admin.tls.certresolver=mytlschallenge"
      
      # --- LEGADO: Webhook Telegram (URL vieja, para transición) ---
      - "traefik.http.routers.inventory-webhook-legacy.rule=Host(`n8n.srv1153123.hstgr.cloud`) && PathPrefix(`/inventory/webhook`)"
      - "traefik.http.routers.inventory-webhook-legacy.entrypoints=websecure"
      - "traefik.http.routers.inventory-webhook-legacy.tls=true"
      - "traefik.http.routers.inventory-webhook-legacy.tls.certresolver=mytlschallenge"
      - "traefik.http.middlewares.inventory-webhook-legacy-strip.stripprefix.prefixes=/inventory"
      - "traefik.http.routers.inventory-webhook-legacy.middlewares=inventory-webhook-legacy-strip@docker"
      
      - "traefik.docker.network=proxy"

  # 🎨 DASHBOARD FRONTEND (Next.js)
  inventory_front:
    build: ./front
    container_name: inventory_front
    restart: always
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      
      # --- FRONTEND (raíz del dominio) ---
      - "traefik.http.routers.inventory-front.rule=Host(`inventory.defriction.org`)"
      - "traefik.http.routers.inventory-front.entrypoints=websecure"
      - "traefik.http.routers.inventory-front.tls=true"
      - "traefik.http.routers.inventory-front.tls.certresolver=mytlschallenge"
      - "traefik.http.services.inventory-front.loadbalancer.server.port=3000"
      
      # Prioridad: front debe evaluarse DESPUÉS de api/webhook/admin
      - "traefik.http.routers.inventory-front.priority=1"
      
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
