version: '3.8'

services:
  # 📦 BOT + API (Python/FastAPI)
  inventory_bot:
    build: .
    container_name: inventory_saas
    restart: always
    env_file: .env
    volumes:
      - ./client_secret.json:/app/client_secret.json
      - ./token.json:/app/token.json
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      
      # --- API BACKEND ---
      - "traefik.http.routers.inventory-api.rule=Host(`inventory-api.defriction.org`)"
      - "traefik.http.routers.inventory-api.entrypoints=websecure"
      - "traefik.http.routers.inventory-api.tls=true"
      - "traefik.http.routers.inventory-api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.inventory-api.loadbalancer.server.port=8000"
      
      # --- LEGADO (opcional, para transición) ---
      - "traefik.http.routers.inventory-bot-legacy.rule=Host(`n8n.srv1153123.hstgr.cloud`) && PathPrefix(`/inventory`)"
      - "traefik.http.routers.inventory-bot-legacy.entrypoints=websecure"
      - "traefik.http.routers.inventory-bot-legacy.tls=true"
      - "traefik.http.routers.inventory-bot-legacy.tls.certresolver=mytlschallenge"
      - "traefik.http.middlewares.inventory-strip.stripprefix.prefixes=/inventory"
      - "traefik.http.routers.inventory-bot-legacy.middlewares=inventory-strip@docker"
      
      - "traefik.docker.network=proxy"

  # 🎨 DASHBOARD FRONTEND (Next.js)
  inventory_front:
    build: ./front
    container_name: inventory_front
    restart: always
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      
      # --- DOMINIO PRINCIPAL ---
      - "traefik.http.routers.inventory-front.rule=Host(`inventory.defriction.org`)"
      - "traefik.http.routers.inventory-front.entrypoints=websecure"
      - "traefik.http.routers.inventory-front.tls=true"
      - "traefik.http.routers.inventory-front.tls.certresolver=mytlschallenge"
      - "traefik.http.services.inventory-front.loadbalancer.server.port=3000"
      
      - "traefik.docker.network=proxy"

networks:
  proxy:
    external: true
